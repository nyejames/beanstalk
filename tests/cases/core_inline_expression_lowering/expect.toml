entry = "."

[backends.html]
mode = "success"
warnings = "forbid"

[[backends.html.artifact_assertions]]
path = "index.html"
kind = "html"
must_contain = [
    "Math.sin(",
    "Math.cos(",
    "Math.pow(2, 3)",
    "Math.min(Math.max(5, 0), 10)",
    "Date.now()",
    "Math.random()",
]
must_not_contain = [
    "function __bs_math_sin(",
    "function __bs_math_cos(",
    "function __bs_math_pow(",
    "function __bs_math_clamp(",
    "function __bs_time_now_millis(",
    "function __bs_random_float(",
]
