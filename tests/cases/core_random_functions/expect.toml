entry = "."

[backends.html]
mode = "success"
warnings = "forbid"
rendered_output_contains = ["core_random value=", " count="]

[[backends.html.artifact_assertions]]
path = "index.html"
kind = "html"
must_contain = [
    "Math.random()",
    "function __bs_random_int(",
    "__bs_random_int(1, 3)",
]
must_not_contain = [
    "function __bs_random_float(",
]

[backends.html_wasm]
mode = "failure"
warnings = "forbid"
error_type = "Rule"
message_contains = ["External function 'random_float' from package '@core/random' is not supported by the Wasm backend."]
