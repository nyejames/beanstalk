entry = "."

[backends.html]
mode = "success"
warnings = "forbid"

[backends.html_wasm]
mode = "success"
warnings = "forbid"

[[backends.html_wasm.artifact_assertions]]
path = "page.wasm"
kind = "wasm"
validate_wasm = true
must_export = ["memory", "bst_str_ptr", "bst_str_len", "bst_release"]

[[backends.html_wasm.artifact_assertions]]
path = "page.js"
kind = "js"
must_contain = ["__bst_instantiate_wasm", "__bst_install_wasm_wrappers"]
must_contain_exactly_once = ["function __bst_install_wasm_wrappers("]
