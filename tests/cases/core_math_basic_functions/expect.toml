path = "index.html"
kind = "html"
must_contain = [
    "Math.sin(",
    "Math.cos(",
    "Math.pow(2, 3)",
    "Math.sqrt(16)",
    "Math.min(Math.max(5, 0), 10)",
]
must_not_contain = [
    "function __bs_math_sin(",
    "function __bs_math_cos(",
    "function __bs_math_pow(",
    "function __bs_math_sqrt(",
    "function __bs_math_clamp(",
]
