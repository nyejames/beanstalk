entry = "."

[backends.html]
mode = "success"
warnings = "forbid"
rendered_output_contains = ["core_time_unused_wasm_wrapper_success"]

[backends.html_wasm]
mode = "success"
warnings = "forbid"

[[backends.html_wasm.artifact_assertions]]
path = "page.wasm"
kind = "wasm"
validate_wasm = true
must_export = ["memory", "bst_str_ptr", "bst_str_len", "bst_release", "bst_start"]
