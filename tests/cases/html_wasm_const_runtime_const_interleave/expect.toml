entry = "."

[backends.html_wasm]
mode = "success"
warnings = "forbid"

[[backends.html_wasm.artifact_assertions]]
path = "index.html"
kind = "html"
must_contain = ["<script src=\"./page.js\"></script>"]

[[backends.html_wasm.artifact_assertions]]
path = "page.wasm"
kind = "wasm"
validate_wasm = true
must_export = ["memory", "bst_str_ptr", "bst_str_len", "bst_release"]

[[backends.html_wasm.artifact_assertions]]
path = "page.js"
kind = "js"
must_contain = [
    "__bst_install_wasm_wrappers",
    "insertAdjacentHTML(\"beforeend\", fn())",
]
must_contain_exactly_once = ["function __bst_install_wasm_wrappers("]
