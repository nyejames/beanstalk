entry = "."

[backends.html]
mode = "success"
warnings = "forbid"
rendered_output_contains_exactly_once = [
    "html_api_only_module_artifact_filtering api-only-import",
]
artifacts_must_not_exist = [
    "api/index.html",
]

[[backends.html.artifact_assertions]]
path = "docs/index.html"
kind = "html"
must_contain = ["html_api_only_module_artifact_filtering const-root"]
