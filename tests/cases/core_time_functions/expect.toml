entry = "."

[backends.html]
mode = "success"
warnings = "forbid"
rendered_output_contains = ["core_time millis=", " seconds="]

[[backends.html.artifact_assertions]]
path = "index.html"
kind = "html"
must_contain = [
    "function __bs_time_now_millis(",
    "function __bs_time_now_seconds(",
    "__bs_time_now_millis()",
    "__bs_time_now_seconds()",
]

[backends.html_wasm]
mode = "failure"
warnings = "forbid"
error_type = "LirTransformation"
message_contains = ["Wasm backend does not yet support host function 'now_millis'"]
