entry = "."

[backends.html]
mode = "success"
warnings = "forbid"
rendered_output_contains = ["core_time millis=", " seconds="]

[[backends.html.artifact_assertions]]
path = "index.html"
kind = "html"
must_contain = [
    "Date.now()",
    "function __bs_time_now_seconds(",
    "__bs_time_now_seconds()",
]
must_not_contain = [
    "function __bs_time_now_millis(",
]

[backends.html_wasm]
mode = "failure"
warnings = "forbid"
diagnostic_codes = ["BST-RULE-0058"]
