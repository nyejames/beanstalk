entry = "."

[backends.html]
mode = "success"
warnings = "forbid"
rendered_output_contains = ["len_empty=0 len_emoji=2 empty_yes=true empty_no=false contains_empty_text=true contains_empty_both=true starts_empty_text=true starts_empty_both=true ends_empty_text=true ends_empty_both=true"]

[[backends.html.artifact_assertions]]
path = "index.html"
kind = "html"
must_contain = [
    "function __bs_text_length(",
    "function __bs_text_is_empty(",
    "function __bs_text_contains(",
    "function __bs_text_starts_with(",
    "function __bs_text_ends_with(",
    "__bs_text_length(\"\")",
    "__bs_text_length(\"😊\")",
]

[backends.html_wasm]
mode = "failure"
warnings = "forbid"
error_type = "Rule"
message_contains = ["External function 'length' from package '@core/text' is not supported by the Wasm backend."]
