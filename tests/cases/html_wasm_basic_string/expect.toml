entry = "."

[backends.html]
mode = "success"
warnings = "forbid"

[[backends.html.artifact_assertions]]
path = "index.html"
kind = "html"
must_contain = ["<script>"]

[backends.html_wasm]
mode = "success"
warnings = "forbid"

[[backends.html_wasm.artifact_assertions]]
path = "index.html"
kind = "html"
must_contain = ["<script src=\"./page.js\"></script>"]

[[backends.html_wasm.artifact_assertions]]
path = "page.js"
kind = "js"
must_contain = ["__bst_instantiate_wasm", "instance.exports.bst_start()", "\"./page.wasm\""]

[[backends.html_wasm.artifact_assertions]]
path = "page.wasm"
kind = "wasm"
validate_wasm = true
must_export = ["memory", "bst_str_ptr", "bst_str_len", "bst_release", "bst_start", "bst_vec_new", "bst_vec_push", "bst_vec_len", "bst_vec_get"]
