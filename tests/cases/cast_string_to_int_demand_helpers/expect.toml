entry = "."

[backends.html]
mode = "success"
warnings = "forbid"
rendered_output_contains = ["string int demand: 42"]

[backends.html_wasm]
mode = "failure"
warnings = "forbid"
diagnostic_codes = ["BST-RULE-0064"]
message_contains = ["Wasm", "runtime casts"]


[[backends.html.artifact_assertions]]
path = "index.html"
kind = "html"
must_contain = [
    "function __bs_cast_int(",
    "function __bs_cast_int_in_range(",
    "function __bs_normalize_numeric_text(",
]

[[backends.html.artifact_assertions]]
path = "index.html"
kind = "html"
must_not_contain = [
    "function __bs_cast_float(",
]
