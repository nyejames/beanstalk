name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  BIN_NAME: bean
  PACKAGE_NAME: beanstalk

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --locked

      - name: Run validation
        run: just validate

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: bean

          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: bean

          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: bean

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: bean.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Print build environment
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          rustc -Vv
          cargo -V
          rustup target list --installed
          xcodebuild -version || true

      - name: Build release binary
        timeout-minutes: 30
        shell: bash
        run: |
          set -euxo pipefail
          cargo build --locked --release --target "${{ matrix.target }}" --verbose


  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euxo pipefail

          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --prerelease \
            --generate-notes \
            --title "Beanstalk ${GITHUB_REF_NAME}"