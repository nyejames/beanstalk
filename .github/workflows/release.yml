name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  BIN_NAME: bean
  PACKAGE_NAME: beanstalk

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --locked

      - name: Run validation
        run: just validate

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: bean

          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: bean

          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: bean

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: bean.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Smoke test binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            "target/${{ matrix.target }}/release/${BIN_NAME}.exe" --version
          else
            "target/${{ matrix.target }}/release/${BIN_NAME}" --version
          fi

      - name: Prepare package directory
        shell: bash
        run: |
          set -euxo pipefail

          ARCHIVE_NAME="${BIN_NAME}-${GITHUB_REF_NAME}-${{ matrix.target }}"

          mkdir -p "package/${ARCHIVE_NAME}"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "package/${ARCHIVE_NAME}/${BIN_NAME}.exe"
          else
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "package/${ARCHIVE_NAME}/${BIN_NAME}"
            chmod +x "package/${ARCHIVE_NAME}/${BIN_NAME}"
          fi

          cp README.md "package/${ARCHIVE_NAME}/"
          cp LICENSE "package/${ARCHIVE_NAME}/" 2>/dev/null || true

      - name: Create tar.gz package
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euxo pipefail

          ARCHIVE_NAME="${BIN_NAME}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          tar -czf "${ARCHIVE_NAME}.tar.gz" -C package "${ARCHIVE_NAME}"

      - name: Create zip package
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ArchiveName = "${env:BIN_NAME}-${env:GITHUB_REF_NAME}-${{ matrix.target }}"
          Compress-Archive -Path "package/${ArchiveName}" -DestinationPath "${ArchiveName}.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euxo pipefail

          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --prerelease \
            --generate-notes \
            --title "Beanstalk ${GITHUB_REF_NAME}"