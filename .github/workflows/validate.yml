name: Validate

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Show checkout identity
        run: |
          pwd
          ls -la
          git rev-parse HEAD
          git status --short
          git log -1 --oneline
          rustc -vV
          cargo clippy -V

      - name: Verify expected clippy cleanup is present
        run: |
          grep -n "field_definitions_from_declarations" src/compiler_frontend/ast/module_ast/environment/builder.rs || true
          grep -n "generic_receiver_method_deferred_diagnostic" src/compiler_frontend/ast/module_ast/environment/function_signatures.rs || true
          grep -n "pub diagnostic: Box<CompilerDiagnostic>" src/compiler_frontend/headers/types.rs || true

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings